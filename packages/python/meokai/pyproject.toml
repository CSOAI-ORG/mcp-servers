[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "meokai"
version = "2.0.0"
description = "MEOK AI Labs Python SDK - Constitutional AI Governance Platform"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Nicholas Templeman", email = "nick@meok.ai"}
]
keywords = ["ai", "governance", "constitutional-ai", "meok", "mcp"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
]
cli = [
    "typer>=0.9.0",
    "rich>=13.0.0",
]

[project.scripts]
meok = "meokai.cli:main"

[project.urls]
Homepage = "https://meok.ai"
Documentation = "https://docs.meok.ai"
Repository = "https://github.com/meok-ai/meokai-python"
Issues = "https://github.com/meok-ai/meokai-python/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["meokai*"]

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]

[tool.ruff]
line-length = 100
target-version = "py39"
