name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r workers/requirements.txt

      - name: Start infrastructure
        run: docker-compose -f docker-compose.infra.yml up -d

      - name: Wait for services
        run: sleep 10

      - name: Run smoke tests
        run: python scripts/smoke_test.py || true

      - name: Upload logs on failure
        if: failure()
        run: docker-compose -f docker-compose.infra.yml logs

      - name: Stop infrastructure
        run: docker-compose -f docker-compose.infra.yml down

  stress-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install httpx

      - name: Start infrastructure
        run: docker-compose -f docker-compose.infra.yml up -d

      - name: Wait for services
        run: sleep 10

      - name: Run stress tests
        run: python scripts/stress_test.py --duration 10 || true

      - name: Stop infrastructure
        run: docker-compose -f docker-compose.infra.yml down

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Start infrastructure
        run: docker-compose -f docker-compose.infra.yml up -d

      - name: Wait for services
        run: sleep 15

      - name: Run E2E tests
        run: |
          cd tests/playwright
          npx playwright test || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright/test-results/

      - name: Stop infrastructure
        run: docker-compose -f docker-compose.infra.yml down

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install ruff

      - name: Run linter
        run: |
          ruff check api/ workers/ scripts/ database/ || true
          ruff format --check api/ workers/ scripts/ database/ || true

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install safety
        run: pip install safety

      - name: Run security scan
        run: |
          pip install -r api/requirements.txt
          pip install -r workers/requirements.txt
          safety check || true
