apiVersion: v1
kind: Service
metadata:
  name: meokai-api-service
  namespace: meokai
  labels:
    app: meokai-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 443
    targetPort: 8000
    protocol: TCP
    name: https
  selector:
    app: meokai-api
---
apiVersion: v1
kind: Service
metadata:
  name: meokai-webhooks-service
  namespace: meokai
  labels:
    app: meokai-webhooks
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: meokai-webhooks
---
apiVersion: v1
kind: Service
metadata:
  name: meokai-redis
  namespace: meokai
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: meokai-postgres
  namespace: meokai
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meokai-pgvector-pvc
  namespace: meokai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meokai-ingress
  namespace: meokai
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - api.meok.ai
    - webhook.meok.ai
    secretName: meokai-tls
  rules:
  - host: api.meok.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: meokai-api-service
            port:
              number: 80
  - host: webhook.meok.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: meokai-webhooks-service
            port:
              number: 8080
